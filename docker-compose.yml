services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nas-postgres
    environment:
      POSTGRES_DB: nas
      POSTGRES_USER: nas
      POSTGRES_PASSWORD: nas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nas -d nas"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: nas-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7-alpine
    container_name: nas-valkey
    restart: unless-stopped

  # ── One-shot setup ────────────────────────────────────────────────────────
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-db-migrate
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=nas
      - PGUSER=nas
      - PGPASSWORD=nas
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  db-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-db-bootstrap
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=nas
      - PGUSER=nas
      - PGPASSWORD=nas
    command: python bootstrap_lookups_if_needed.py
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-api
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=nas
      - PGUSER=nas
      - PGPASSWORD=nas
      - ES_URL=http://opensearch:9200
      - VALKEY_URL=redis://valkey:6379/0
      - VALKEY_STREAM_KEY=bulk_ingest_events
      - VALKEY_STREAM_GROUP=bulk_ingest_workers
      - INGEST_EXECUTION_MODE=queue_worker
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - nas_output:/app/output
      - nas_logs:/app/logs
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-worker
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=nas
      - PGUSER=nas
      - PGPASSWORD=nas
      - ES_URL=http://opensearch:9200
      - VALKEY_URL=redis://valkey:6379/0
      - VALKEY_STREAM_KEY=bulk_ingest_events
      - VALKEY_STREAM_GROUP=bulk_ingest_workers
      - INGEST_EXECUTION_MODE=queue_worker
      - WORKER_METRICS_PORT=9101
    command: python -m backend.app.workers.queue_consumer
    volumes:
      - nas_output:/app/output
      - nas_logs:/app/logs
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: nas-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  nas_output:
  nas_logs:
