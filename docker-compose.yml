services:
  postgres:
    image: kartoza/postgis:16-3.4
    container_name: nas-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PGDATABASE}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_PASS=${PGPASSWORD}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
      
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: nas-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nas-minio
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-api
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - ES_URL=http://elasticsearch:9200
      - INGEST_EXECUTION_MODE=queue_worker
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - minio
    profiles:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nas-worker
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - ES_URL=http://elasticsearch:9200
      - INGEST_EXECUTION_MODE=queue_worker
    command: python -m backend.app.workers.queue_consumer
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - minio
    profiles:
      - worker

volumes:
  pgdata:
  esdata:
  miniodata:
