services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nas-postgres
    env_file:
      - .env
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro

volumes:
  pgdata:
